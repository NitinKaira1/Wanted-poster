<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WANTED Poster Cam</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a0f00;
    color: #f0d080;
    font-family: Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 16px;
  }

  h1 {
    font-size: 3rem;
    color: #cc2200;
    text-shadow: 2px 2px 8px #000;
    letter-spacing: 6px;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 0.95rem;
    letter-spacing: 3px;
    color: #c8a050;
    margin-bottom: 28px;
  }

  .card {
    background: #2a1800;
    border: 2px solid #8b5e1a;
    border-radius: 8px;
    padding: 24px;
    width: 100%;
    max-width: 700px;
    margin-bottom: 20px;
  }

  /* ── webcam feed ── */
  #feed-wrap {
    position: relative;
    width: 100%;
    background: #111;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 16px;
    min-height: 240px;         /* always visible even before cam starts */
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #feed {
    width: 100%;
    display: block;
    transform: scaleX(-1);     /* mirror so it feels like a selfie cam */
    background: #000;
  }

  #snap-canvas { display: none; }

  .badge {
    position: absolute;
    top: 10px; left: 10px;
    background: #cc2200;
    color: #fff;
    font-size: 0.7rem;
    letter-spacing: 2px;
    padding: 3px 8px;
    border-radius: 3px;
    z-index: 10;
  }

  #cam-status-msg {
    position: absolute;
    color: #f0d080;
    font-size: 0.9rem;
    text-align: center;
    padding: 16px;
    line-height: 1.6;
  }

  /* ── controls ── */
  .controls { display: flex; gap: 12px; flex-wrap: wrap; }

  button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    font-family: Georgia, serif;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity .15s;
  }
  button:hover  { opacity: .85; }
  button:disabled { opacity: .4; cursor: not-allowed; }

  #btn-capture  { background: #cc2200; color: #fff; font-weight: bold; }
  #btn-template { background: #5a3a00; color: #f0d080; }

  .api-row {
    display: flex; gap: 8px; align-items: center;
    margin-top: 12px; flex-wrap: wrap;
  }
  .api-row input {
    flex: 1; min-width: 180px;
    padding: 9px 12px;
    background: #1a0f00;
    border: 1px solid #8b5e1a;
    border-radius: 6px;
    color: #f0d080;
    font-size: 0.9rem;
  }
  #btn-groq { background: #1a4a1a; color: #90ee90; padding: 9px 18px; flex-shrink: 0; }

  #status {
    margin-top: 14px;
    min-height: 24px;
    font-size: 0.9rem;
    color: #c8a050;
    text-align: center;
    letter-spacing: 1px;
  }
  #status.ok  { color: #90ee90; }
  #status.err { color: #ff6060; }

  /* ── poster result ── */
  #result { display: none; text-align: center; }
  #result h2 { color: #cc2200; letter-spacing: 4px; margin-bottom: 14px; }
  #poster-img {
    max-width: 100%;
    border: 4px solid #8b5e1a;
    border-radius: 6px;
    box-shadow: 0 0 30px #cc220055;
  }
  #btn-download {
    display: inline-block;
    margin-top: 14px;
    padding: 11px 28px;
    background: #cc2200;
    color: #fff;
    border-radius: 6px;
    text-decoration: none;
    letter-spacing: 2px;
    font-family: Georgia, serif;
  }
  #btn-download:hover { opacity: .85; }
</style>
</head>
<body>

<h1>⚠ WANTED ⚠</h1>
<p class="subtitle">POSTER GENERATOR · DEAD OR ALIVE</p>

<div class="card">
  <div id="feed-wrap">
    <video id="feed" autoplay playsinline muted></video>
    <canvas id="snap-canvas"></canvas>
    <span class="badge" id="live-badge">● STARTING…</span>
    <div id="cam-status-msg">Requesting camera access…</div>
  </div>

  <div class="controls">
    <button id="btn-capture"  onclick="capture('groq_key')">📸 CAPTURE + AI ROAST</button>
    <button id="btn-template" onclick="captureTemplate()">🎲 CAPTURE + TEMPLATE</button>
  </div>

  <div class="api-row">
    <input id="groq_key" type="password" placeholder="Groq API key  gsk_...  (optional for AI roast)">
    <button id="btn-groq" onclick="capture('groq_key')">⚡ Groq</button>
  </div>

  <div id="status">Look at the camera and press CAPTURE</div>
</div>

<div class="card" id="result">
  <h2>🤠 YOUR WANTED POSTER</h2>
  <img id="poster-img" src="" alt="wanted poster">
  <br>
  <a id="btn-download" href="" download="wanted_poster.jpg">⬇ DOWNLOAD POSTER</a>
</div>

<script>
  const video     = document.getElementById('feed');
  const canvas    = document.getElementById('snap-canvas');
  const badge     = document.getElementById('live-badge');
  const camMsg    = document.getElementById('cam-status-msg');
  let   camReady  = false;

  // ── Start browser webcam ─────────────────────────────────────────────────
  async function startCamera() {
    // getUserMedia is only available on HTTPS or localhost
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showCamError('Camera API not available.\nMake sure the site is served over HTTPS.');
      return;
    }

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
        audio: false
      });
      video.srcObject = stream;

      video.onloadedmetadata = () => {
        video.play();
        camMsg.style.display  = 'none';
        badge.textContent     = '● LIVE';
        badge.style.background = '#cc2200';
        camReady = true;
        setStatus('Look at the camera and press CAPTURE');
      };

    } catch (err) {
      let hint = '';
      if (err.name === 'NotAllowedError')
        hint = 'Camera permission was denied.\nClick the camera icon in your browser address bar and allow access, then reload.';
      else if (err.name === 'NotFoundError')
        hint = 'No camera found on this device.';
      else if (err.name === 'NotReadableError')
        hint = 'Camera is in use by another app. Close other tabs/apps using the camera and reload.';
      else
        hint = err.name + ': ' + err.message;

      showCamError(hint);
    }
  }

  function showCamError(msg) {
    camMsg.style.color   = '#ff6060';
    camMsg.textContent   = '⚠ ' + msg;
    badge.textContent    = '● NO CAMERA';
    badge.style.background = '#555';
    setStatus('Camera unavailable — see message above', 'err');
  }

  startCamera();

  // ── Grab a JPEG snapshot ─────────────────────────────────────────────────
  function snapshotBase64() {
    // Video must be playing and have real dimensions
    const w = video.videoWidth;
    const h = video.videoHeight;

    if (!w || !h) return null;

    canvas.width  = w;
    canvas.height = h;

    const ctx = canvas.getContext('2d');
    // Un-mirror for the server (we mirrored via CSS only)
    ctx.drawImage(video, 0, 0);
    return canvas.toDataURL('image/jpeg', 0.92);
  }

  // ── UI helpers ───────────────────────────────────────────────────────────
  function setStatus(msg, type='') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className   = type;
  }

  function disableButtons(yes) {
    ['btn-capture','btn-template','btn-groq'].forEach(id => {
      document.getElementById(id).disabled = yes;
    });
  }

  // ── Capture flow ─────────────────────────────────────────────────────────
  async function capture(keyInputId) {
    if (!camReady) {
      setStatus('❌ Camera not ready — allow camera access and reload', 'err');
      return;
    }

    const imageData = snapshotBase64();
    if (!imageData) {
      setStatus('❌ Could not grab frame — camera may still be initialising, try again', 'err');
      return;
    }

    const apiKey = keyInputId ? document.getElementById(keyInputId).value.trim() : '';
    const useApi = apiKey.length > 0;

    disableButtons(true);
    setStatus('⏳ Processing…', '');

    try {
      const resp = await fetch('/capture', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ use_api: useApi, api_key: apiKey, image: imageData }),
      });

      const data = await resp.json();

      if (!resp.ok || data.error) {
        setStatus('❌ ' + (data.error || 'Something went wrong'), 'err');
        disableButtons(false);
        return;
      }

      showPoster(data);

    } catch(e) {
      setStatus('❌ Network error: ' + e.message, 'err');
      disableButtons(false);
    }
  }

  function captureTemplate() {
    document.getElementById('groq_key').value = '';
    capture(null);
  }

  function showPoster(data) {
    const src = `/output/wanted_poster.jpg?t=${Date.now()}`;
    document.getElementById('poster-img').src    = src;
    document.getElementById('btn-download').href = src;
    document.getElementById('result').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior: 'smooth' });

    const srcLabel = data.source === 'groq' ? '⚡ Groq AI' : '🎲 Template';
    setStatus(`✅ Done!  ${srcLabel}  •  Alias: ${data.alias}  •  Bounty: $${Number(data.bounty).toLocaleString()}`, 'ok');
    disableButtons(false);
  }
</script>
</body>
</html>
